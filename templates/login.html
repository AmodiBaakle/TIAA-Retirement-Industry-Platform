{% extends 'base_auth.html' %}
{% block page_title %}Log in{% endblock %}
{% block content %}
<div class="card">
  <div class="brand"><span class="logo">🪙</span><span>{{ app_name }}</span></div>
  <h2>Welcome back</h2>
  <p class="lead">Log in to pick up your saving streak.</p>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="post" action="/login">
    {% csrf_token %}
    <div class="field">
      <label>Email</label>
      <input type="email" name="mail" placeholder="you@email.com" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="pwd" placeholder="Your password" required>
    </div>
    <button class="btn btn-primary" type="submit">Log in</button>
  </form>
  <p class="alt">New here? <a href="/enter_info">Create an account</a></p>
</div>
{% endblock %}
