<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    /* Custom CSS for centering buttons */
    .center-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      margin-bottom: 20px;
    }
    .card-container {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">TARA</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="/profile">Profile</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/dashboard">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/expense">Expense</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/wallet">Wallet</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    <!-- Centered buttons for Register and Login -->
    <h1>Welcome {{Data.name}}!</h1>
    
    <div class="row card-container">
      <div class="col-md-6">
        <!-- Email ID Card -->
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Email ID</h5>
            <p class="card-text">{{Data.mail}}</p>
          </div>
        </div>

        <!-- Date of Birth Card -->
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Date of Birth</h5>
            <p class="card-text">{{Data.dob}}</p>
          </div>
        </div>

        <!-- Work Class Card -->
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Work Class</h5>
            <p class="card-text"> {{Data.wc}} </p>
          </div>
        </div>

        <!-- Marital Status Card -->
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Marital Status</h5>
            <p class="card-text"> {{Data.ms}} </p>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <!-- Occupation Card -->
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Occupation</h5>
            <p class="card-text"> {{Data.occ}} </p>
          </div>
        </div>

        <!-- Gender Card -->
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Gender</h5>
            <p class="card-text"> {{Data.gender}}</p>
          </div>
        </div>

        <!-- Salary Card -->
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Income</h5>
            <p class="card-text">Rs. {{Data.salary}}</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bootstrap JS, Popper.js, and jQuery -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
